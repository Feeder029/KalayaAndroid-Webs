<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join the Katipunan - Authentication</title>
    <link rel="stylesheet" href="auth.css">
</head>
<body>
    <!-- Authentication Modal -->
    <div class="auth-modal" id="authModal">
        <div class="auth-modal-content">
            <button class="auth-close" onclick="closeAuthModal()">&times;</button>
            
            <!-- Sign In Form -->
            <div class="auth-form" id="signInForm">
                <div class="auth-header">
                    <h2>Join the Revolution</h2>
                    <p>Sign in to download the game</p>
                </div>
                
                <form onsubmit="handleSignIn(event)">
                    <div class="form-group">
                        <label for="signInEmail">Email Address</label>
                        <input type="email" id="signInEmail" placeholder="Enter your email" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="signInPassword">Password</label>
                        <input type="password" id="signInPassword" placeholder="Enter your password" required>
                    </div>
                    
                    <div class="form-options">
                        <label class="checkbox-label">
                            <input type="checkbox" id="rememberMe">
                            <span>Remember me</span>
                        </label>
                        <a href="#" class="forgot-password">Forgot password?</a>
                    </div>
                    
                    <button type="submit" class="auth-btn primary">Sign In</button>
                    
                    <div class="divider">
                        <span>OR</span>
                    </div>
                    
                    <div class="social-auth">
                        <button type="button" class="social-btn google" onclick="handleGoogleAuth()">
                            <span class="social-icon">G</span>
                            Continue with Google
                        </button>
                        <button type="button" class="social-btn facebook" onclick="handleFacebookAuth()">
                            <span class="social-icon">f</span>
                            Continue with Facebook
                        </button>
                    </div>
                    
                    <div class="auth-switch">
                        <p>Don't have an account? <a href="#" onclick="showSignUp()">Sign Up</a></p>
                    </div>
                </form>
            </div>
            
            <!-- Sign Up Form -->
            <div class="auth-form" id="signUpForm" style="display: none;">
                <div class="auth-header">
                    <h2>Create Your Account</h2>
                    <p>Join the Katipunan and fight for freedom</p>
                </div>
                
                <form onsubmit="handleSignUp(event)">
                    <div class="form-group">
                        <label for="signUpName">Full Name</label>
                        <input type="text" id="signUpName" placeholder="Enter your full name" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="signUpEmail">Email Address</label>
                        <input type="email" id="signUpEmail" placeholder="Enter your email" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="signUpPassword">Password</label>
                        <input type="password" id="signUpPassword" placeholder="Create a password" required minlength="8">
                        <small class="form-hint">At least 8 characters</small>
                    </div>
                    
                    <div class="form-group">
                        <label for="signUpConfirmPassword">Confirm Password</label>
                        <input type="password" id="signUpConfirmPassword" placeholder="Confirm your password" required>
                    </div>
                    
                    <div class="form-options">
                        <label class="checkbox-label">
                            <input type="checkbox" id="agreeTerms" required>
                            <span>I agree to the <a href="#" class="terms-link">Terms & Conditions</a></span>
                        </label>
                    </div>
                    
                    <button type="submit" class="auth-btn primary">Create Account</button>
                    
                    <div class="divider">
                        <span>OR</span>
                    </div>
                    
                    <div class="social-auth">
                        <button type="button" class="social-btn google" onclick="handleGoogleAuth()">
                            <span class="social-icon">G</span>
                            Continue with Google
                        </button>
                        <button type="button" class="social-btn facebook" onclick="handleFacebookAuth()">
                            <span class="social-icon">f</span>
                            Continue with Facebook
                        </button>
                    </div>
                    
                    <div class="auth-switch">
                        <p>Already have an account? <a href="#" onclick="showSignIn()">Sign In</a></p>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="auth.js"></script>
</body>
</html>
